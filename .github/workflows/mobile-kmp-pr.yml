name: 'Mobile KMP — PR'

on:
  workflow_call:
    inputs:
      app-name:
        type: string
        required: true
      targets:
        description: 'Comma-separated: android,ios,jvm,js'
        type: string
        required: false
        default: 'android,ios'
      java-version:
        type: string
        required: false
        default: '17'

jobs:
  pr-validate:
    uses: cvch29/platform-workflows/.github/workflows/shared-pr-validation.yml@main
    with:
      app-name: ${{ inputs.app-name }}
      runtime: kmp

  build-test:
    name: Build & Test
    needs: pr-validate
    runs-on: ${{ contains(inputs.targets, 'ios') && 'macos-latest' || 'ubuntu-latest' }}
    steps:
      - uses: cvch29/platform-actions/actions/shared/checkout@main
      - uses: cvch29/platform-actions/actions/tooling-v2/kmp/setup@main
        with:
          java-version: ${{ inputs.java-version }}
          targets: ${{ inputs.targets }}
      - uses: cvch29/platform-actions/actions/tooling-v2/kmp/build@main
        with:
          targets: ${{ inputs.targets }}
          build-type: debug
      - name: Run tests
        shell: bash
        run: |
          TASKS=""
          echo "${{ inputs.targets }}" | tr ',' '\n' | while read T; do
            case "$T" in
              android) TASKS="$TASKS testDebugUnitTest" ;;
              ios)     TASKS="$TASKS iosSimulatorArm64Test" ;;
              jvm)     TASKS="$TASKS jvmTest" ;;
              js)      TASKS="$TASKS jsTest" ;;
            esac
          done
          ./gradlew $TASKS --stacktrace

  security:
    needs: pr-validate
    uses: cvch29/platform-workflows/.github/workflows/shared-security-scan.yml@main
    with:
      app-name: ${{ inputs.app-name }}
      language: java
      run-codeql: true
      run-sca: true
      run-secrets: true
      run-sast: false
    permissions:
      contents: read
      security-events: write
