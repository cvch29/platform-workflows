name: 'Mobile Android — PR'

on:
  workflow_call:
    inputs:
      app-name:
        type: string
        required: true
      java-version:
        type: string
        required: false
        default: '17'
      run-lint:
        type: boolean
        required: false
        default: true
      run-unit-tests:
        type: boolean
        required: false
        default: true
      gradle-build-path:
        type: string
        default: app/build.gradle.kts
      properties:
        description: 'Additional properties for SonarQube analysis'
        type: string
        required: false
        default: ''
jobs:
  setup:
    name: Setup
    runs-on: arc-mobile
    outputs:
      app-version: ${{ steps.setup-android.outputs.app-version }}
      app-name: ${{ steps.setup-android.outputs.app-name }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup Environment
        id: setup-android
        uses: cvch29/platform-actions/actions/shared/setup-gradle@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
