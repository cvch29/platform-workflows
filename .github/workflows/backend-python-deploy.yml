name: 'Backend Python — Deploy'

on:
  workflow_call:
    inputs:
      app-name:
        type: string
        required: true
      environment:
        type: string
        required: true
      image-tag:
        type: string
        required: true
      acr-registry:
        type: string
        required: true
      aks-cluster-name:
        type: string
        required: true
      aks-resource-group:
        type: string
        required: true
    secrets:
      azure-client-id:
        required: true
      azure-tenant-id:
        required: true
      azure-subscription-id:
        required: true

jobs:
  deploy:
    # Python deploys reuse the node deploy workflow (same Docker/Helm path)
    uses: cvch29/platform-workflows/.github/workflows/backend-node-deploy.yml@v1
    with:
      app-name: ${{ inputs.app-name }}
      environment: ${{ inputs.environment }}
      image-tag: ${{ inputs.image-tag }}
      acr-registry: ${{ inputs.acr-registry }}
      aks-cluster-name: ${{ inputs.aks-cluster-name }}
      aks-resource-group: ${{ inputs.aks-resource-group }}
    secrets:
      azure-client-id: ${{ secrets.azure-client-id }}
      azure-tenant-id: ${{ secrets.azure-tenant-id }}
      azure-subscription-id: ${{ secrets.azure-subscription-id }}
