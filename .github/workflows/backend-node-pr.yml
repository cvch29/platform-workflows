name: 'Backend Node — PR'

on:
  workflow_call:
    inputs:
      app-name:
        type: string
        required: true
      node-version:
        type: string
        required: false
        default: '20'
      package-manager:
        type: string
        required: false
        default: 'npm'
      coverage-threshold:
        type: number
        required: false
        default: 80

jobs:
  pr-validate:
    uses: cvch29/platform-workflows/.github/workflows/shared-pr-validation.yml@main
    with:
      app-name: ${{ inputs.app-name }}
      runtime: node

  build-test:
    name: Build & Test
    needs: pr-validate
    runs-on: ubuntu-latest
    steps:
      - uses: cvch29/platform-actions/actions/shared/checkout@main
      - uses: cvch29/platform-actions/actions/tooling-v2/node/install@main
        with:
          node-version: ${{ inputs.node-version }}
          package-manager: ${{ inputs.package-manager }}
      - uses: cvch29/platform-actions/actions/tooling-v2/node/test@main
        with:
          package-manager: ${{ inputs.package-manager }}
          coverage: true
          coverage-threshold: ${{ inputs.coverage-threshold }}
      - uses: cvch29/platform-actions/actions/tooling-v2/node/build@main
        with:
          package-manager: ${{ inputs.package-manager }}

  security:
    needs: pr-validate
    uses: cvch29/platform-workflows/.github/workflows/shared-security-scan.yml@main
    with:
      app-name: ${{ inputs.app-name }}
      language: javascript
      run-codeql: true
      run-sca: true
      run-secrets: true
      run-sast: true
    permissions:
      contents: read
      security-events: write
