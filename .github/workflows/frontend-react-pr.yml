name: 'Frontend React — PR'

on:
  workflow_call:
    inputs:
      app-name:
        type: string
        required: true
      node-version:
        type: string
        required: false
        default: '20'
      package-manager:
        type: string
        required: false
        default: 'npm'
      coverage-threshold:
        type: number
        required: false
        default: 80

jobs:
  pr-validate:
    uses: cvch29/platform-workflows/.github/workflows/shared-pr-validation.yml@v1
    with:
      app-name: ${{ inputs.app-name }}
      runtime: node

  lint-test:
    name: Lint & Test
    needs: pr-validate
    runs-on: ubuntu-latest
    steps:
      - uses: cvch29/platform-actions/.github/actions/shared/checkout@v1
      - uses: cvch29/platform-actions/.github/actions/tooling/node/install@v1
        with:
          node-version: ${{ inputs.node-version }}
          package-manager: ${{ inputs.package-manager }}
      - shell: bash
        run: ${{ inputs.package-manager }} run lint
      - uses: cvch29/platform-actions/.github/actions/tooling/node/test@v1
        with:
          package-manager: ${{ inputs.package-manager }}
          coverage: true
          coverage-threshold: ${{ inputs.coverage-threshold }}
      - uses: cvch29/platform-actions/.github/actions/tooling/node/build@v1
        with:
          package-manager: ${{ inputs.package-manager }}

  security:
    needs: pr-validate
    uses: cvch29/platform-workflows/.github/workflows/shared-security-scan.yml@v1
    with:
      app-name: ${{ inputs.app-name }}
      language: javascript
      run-codeql: true
      run-sca: true
      run-secrets: true
      run-sast: true
    permissions:
      contents: read
      security-events: write
