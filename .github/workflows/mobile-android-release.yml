name: 'Mobile Android — Release'

on:
  workflow_call:
    inputs:
      technology:
        description: 'react-native | native'
        type: string
        required: true
      android-channel:
        type: string
        required: false
        default: 'play-internal'
      package-manager:
        type: string
        required: false
        default: 'yarn'
      build-gradle-path:
        type: string
        default: app/build.gradle
      environment:
        type: string
        default: dev
      flavor:
        type: string
        default: ''
      command:
        type: string
        default: assembleRelease
      enable-android:
        type: boolean
        default: true
      enable-ios:
        type: boolean
        default: false
    secrets:
      keystore-base64:
        required: false
      keystore-password:
        required: false
      keystore-alias:
        required: false
      keystore-path:
        required: false
      github-token:
        required: true

jobs:
  setup:
    name: Setup
    runs-on: 
      group: arc-general
    outputs:
      app-version: ${{ steps.setup-android.outputs.app-version }}
      app-name: ${{ steps.setup-android.outputs.app-name }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup Environment
        id: setup-android
        uses: cvch29/platform-actions/actions/shared/setup-gradle@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          build-gradle-path: ${{ inputs.build-gradle-path }}
          
