name: 'Mobile Android — Release'

on:
  workflow_call:
    inputs:
      app-name:
        type: string
        required: true
      channel:
        description: 'firebase | play-internal | play-alpha | play-beta | play-production'
        type: string
        required: true
      flavor:
        type: string
        required: false
        default: ''
      package-name:
        type: string
        required: false
        default: ''
      firebase-app-id:
        type: string
        required: false
        default: ''
      gradle-build-path:
        type: string
        default: app/build.gradle.kts
    outputs:
      version:
        value: ${{ jobs.distribute.outputs.version }}
    secrets:
      keystore-base64:
        required: true
      keystore-password:
        required: true
      key-alias:
        required: true
      key-password:
        required: true
      firebase-service-account:
        required: false
      google-play-service-account-json:
        required: false
      github-token:
        required: true

jobs:
  # security:
  #   uses: cvch29/platform-workflows/.github/workflows/mobile-android-security.yml@main
  #   with:
  #     app-name: ${{ inputs.app-name }}
  #   permissions:
  #     contents: read
  #     security-events: write
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.setup_android.outputs.app_version }}
      app_name: ${{ steps.setup_android.outputs.app_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Environment
        id: setup_android
        uses: cvch29/platform-actions/.github/actions/domains/mobile/android/setup@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          build-gradle-path: ${{ inputs.gradle-build-path }}
  build:
    # needs: security
    uses: cvch29/platform-workflows/.github/workflows/mobile-android-build.yml@main
    with:
      app-name: ${{ inputs.app-name }}
      build-type: release
      flavor: ${{ inputs.flavor }}
      sign: true
    secrets:
      keystore-base64: ${{ secrets.keystore-base64 }}
      keystore-password: ${{ secrets.keystore-password }}
      key-alias: ${{ secrets.key-alias }}
      key-password: ${{ secrets.key-password }}

