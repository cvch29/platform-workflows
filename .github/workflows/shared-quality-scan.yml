name: 'Shared - Quality Scan'

on:
  workflow_call:
    inputs:
      app-name:
        type: string
        required: false
      app-version:
        type: string
        required: false
        default: 'v1.0.0'
      language:
        description: 'javascript | java | kotlin | android | python | swift'
        type: string
        required: false
      environment:
        type: string
        required: false
        default: 'dev'
      sonar-host:
        type: string
        required: false
        default: 'http://10.202.42.158:9000'
      repository-name:
        type: string
        required: false
        default: ${{ github.event.repository.name }}
      coverage-report-path:
        description: 'Path to coverage report for Sonar (lcov.info / jacoco XML / coverage.xml)'
        type: string
        required: false
        default: ''
      properties:
        description: 'Additional properties to pass to SonarQube (e.g. -Dsonar.exclusions=**/*.test.js)'
        type: string
        required: false
        default: ''
    secrets:
      SONAR_TOKEN:
        required: false
      GH_TOKEN:
        required: false
jobs:
  cov-unit-test:
    name: Coverage Unit Tests
    runs-on: arc-mobile
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0   # Sonar needs full history for blame/new code detection
          persist-credentials: false

      - name: Unit test + Coverage
        id: unit-test
        uses: cvch29/platform-actions/actions/domains/mobile/android/unit-test@main

      - name: Validar coverage
        run: |
          ls -la
          # find . -path "*jacocoUnitTest*Report*"
          ls -la ${{ github.workspace }}/data/build/reports/jacoco/jacocoUnitTestReport/

          #Imprimir porcentaje
          awk -F, ' { instructions += $4 + $5; covered += $5 } END { print " \n the current coverage: \n"; print 100*covered/instructions, " % coverage " }' ${{ github.workspace }}/data/build/reports/jacoco/jacocoUnitTestReport/jacocoUnitTestReport.csv

          # capturando resultado
          resultado=$(awk -F, ' { instructions += $4 + $5; covered += $5 } END { print 100*covered/instructions }' ${{ github.workspace }}/data/build/reports/jacoco/jacocoUnitTestReport/jacocoUnitTestReport.csv)
          int=${resultado%.*}

          # condicionando al superar umbral
          if [ "${int}" -le "99" ]
          then
            echo "##vso[task.logissue type=warning] A partir del 1 de Septiembre, todo despliegue deberá contar el 100% de cobertura de pruebas unitarias."
            echo "##vso[task.complete result=SucceededWithIssues;]"
          fi

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: "${{ github.workspace }}/data/build/reports/jacoco/jacocoUnitTestReport/jacocoUnitTestReport.xml"

  sonar:
    name: SonarQube Analysis
    needs: cov-unit-test
    runs-on: arc-mobile
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Download Coverage
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report

      - name: Git Differences
        run: |
          # ls -la app/build
          ls -la ${{ github.workspace }}/jacocoUnitTestReport.xml
          git merge-base origin/main HEAD
          git diff --name-only origin/main...HEAD | wc -l

      - name: Validate Git history
        run: |
          echo "Git shallow status:"
          git rev-parse --is-shallow-repository

          echo "Current branch:"
          git branch --show-current

          echo "Available branches:"
          git branch -a

          echo "Git commits:"
          git log --oneline -5

      - name: Clean Sonar Properties
        run: |
          find . -type f -name sonar-project.properties -delete

      - name: Ensure SonarQube project exists
        env:
          SONAR_HOST_URL: "http://192.168.1.199:9000"
          SONAR_TOKEN: "squ_a99d67d5e6cd375765943b0e2504533494c9ab8f"
          SONAR_PROJECT_KEY: ${{ inputs.repository-name }}
          SONAR_PROJECT_NAME: ${{ inputs.repository-name }}
        run: |
          EXISTS=$(curl -s \
            -u "$SONAR_TOKEN:" \
            "$SONAR_HOST_URL/api/projects/search?projects=$SONAR_PROJECT_KEY" \
            | jq '.components | length')

          if [ "$EXISTS" -eq 0 ]; then
            echo "Project does not exist. Creating..."

            curl -s \
              -u "$SONAR_TOKEN:" \
              -X POST \
              "$SONAR_HOST_URL/api/projects/create" \
              -d "project=$SONAR_PROJECT_KEY" \
              -d "name=$SONAR_PROJECT_NAME"

          else
            echo "Project already exists. Skipping creation."
          fi


      # # ------------------------------------------
      # # Task 1: Obtener Custom Properties GitHub
      # # Responsabilidad: leer configuración del repo
      # # ------------------------------------------
      # - name: Get GitHub Custom Properties
      #   id: github_properties
      #   env:
      #     GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #   run: |
      #     OWNER="${{ github.repository_owner }}"
      #     REPO="${{ github.event.repository.name }}"

      #     PROPERTIES=$(curl -s \
      #       -H "Authorization: Bearer $GH_TOKEN" \
      #       -H "Accept: application/vnd.github+json" \
      #       "https://api.github.com/repos/$OWNER/$REPO/properties/values")

      #     QUALITY_GATE=$(echo "$PROPERTIES" | jq -r \
      #       '.[] | select(.property_name=="property_quality_gate") | .value')

      #     echo "quality_gate=$QUALITY_GATE" >> "$GITHUB_OUTPUT"

      # - name: Assign Quality Gate
      #   run: |
      #     QUALITY_GATE="${{ steps.github_properties.outputs.quality_gate }}"
      #     PROJECT_KEY="${{ steps.github_properties.outputs.project_key }}"

      #     if [ -z "$QUALITY_GATE" ] || [ "$QUALITY_GATE" == "null" ]; then
      #       echo "No Quality Gate defined"
      #       exit 0
      #     fi

      #     GATE_ID=$(curl -s \
      #       -u "$SONAR_TOKEN:" \
      #       "$SONAR_HOST_URL/api/qualitygates/list" \
      #       | jq -r \
      #       ".qualitygates[] | select(.name==\"$QUALITY_GATE\") | .id")

      #     curl -s \
      #       -u "$SONAR_TOKEN:" \
      #       -X POST \
      #       "$SONAR_HOST_URL/api/qualitygates/select" \
      #       -d "projectKey=$PROJECT_KEY" \
      #       -d "gateId=$GATE_ID"

      - name: SonarQube Scan — Pull Request
        if: github.event_name == 'pull_request'
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e
        env:
          SONAR_TOKEN: "squ_a99d67d5e6cd375765943b0e2504533494c9ab8f"
          SONAR_HOST_URL: "http://192.168.1.199:9000/"
        with:
          # skipSignatureVerification: true
          args: >
            -Dsonar.projectKey=${{ inputs.repository-name }}
            -Dsonar.projectName=${{ inputs.repository-name }}
            -Dsonar.projectVersion=${{ inputs.app-version }}-${{ github.run_number }}
            -Dsonar.sources=data/src/
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
            -Dsonar.pullrequest.branch=${{ github.head_ref }}
            -Dsonar.pullrequest.base=${{ github.base_ref }}
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.coverage.jacoco.xmlReportPaths=${{ github.workspace }}/jacocoUnitTestReport.xml
            ${{ inputs.properties }}

      - name: SonarQube Scan — Branch
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e
        env:
          SONAR_TOKEN: "squ_a99d67d5e6cd375765943b0e2504533494c9ab8f"
          SONAR_HOST_URL: "http://192.168.1.199:9000/"
        with:
          # skipSignatureVerification: true
          args: >
            -Dsonar.projectKey=${{ inputs.repository-name }}
            -Dsonar.projectName=${{ inputs.repository-name }}
            -Dsonar.projectVersion=${{ inputs.app-version }}-${{ github.run_number }}
            -Dsonar.sources=data/src/main
            -Dsonar.tests=data/src/test
            -Dsonar.java.source=17
            -Dsonar.coverage.exclusions=**/build/**,**/*.xml,**/*.yml,**/*.yaml,**/*.json,**/docs/**,**/generated/**,**/target/**,**/R.java,**/BuildConfig.java
            -Dsonar.java.binaries=app/build/intermediates/javac,app/build/tmp/kotlin-classes
            -Dsonar.branch.name=${{ github.ref_name }}
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.coverage.jacoco.xmlReportPaths=jacocoUnitTestReport.xml
            ${{ inputs.properties }}

      - name: Quality Gate
        uses: cvch29/platform-actions/actions/security/sonar-break-build-v2@main
        env:
          QUALITY_GATE_ENABLED: 'true'
          QUALITY_GATE_VALIDATE_EXCLUDE: 'false'
        with:
          sonar-host-url: "http://192.168.1.199:9000"
          sonar-token: "squ_a99d67d5e6cd375765943b0e2504533494c9ab8f"
          # sonar-token: ${{ secrets.sonar-token }}
          project: ${{ inputs.repository-name }}
          branch: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref_name }}
