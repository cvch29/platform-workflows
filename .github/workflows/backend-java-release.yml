name: 'Backend Java — Release'

# ─────────────────────────────────────────────────────────────────────────────
# Golden path para releases de aplicaciones Java/Spring Boot.
# Mismo patrón que mobile-rn-release.yml:
#   setup → build → scs → artifact_release
#
# Soporta deploy a: aks | azure-webapp | azure-function
#
# Uso en el app repo:
#   jobs:
#     release:
#       uses: cvch29/platform-workflows/.github/workflows/backend-java-release.yml@main
#       with:
#         app-name: payments-service
#         deploy-target: aks
#         acr-registry: mybank.azurecr.io
#         aks-cluster-name: mybank-aks
#         aks-resource-group: mybank-rg
#         environment: dev
#       secrets:
#         github-token: ${{ secrets.GITHUB_TOKEN }}
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      app-name:
        type: string
        required: true
      environment:
        type: string
        required: false
        default: 'dev'
      deploy-target:
        description: 'aks | azure-webapp | azure-function'
        type: string
        required: true
      java-version:
        type: string
        required: false
        default: '17'
      gradle-tasks:
        type: string
        required: false
        default: 'bootJar'
      # AKS
      acr-registry:
        type: string
        required: false
        default: ''
      aks-cluster-name:
        type: string
        required: false
        default: ''
      aks-resource-group:
        type: string
        required: false
        default: ''
      helm-values-file:
        description: 'Path al values file del ambiente (ej: helm/values-prod.yaml)'
        type: string
        required: false
        default: ''
      namespace:
        type: string
        required: false
        default: 'default'
      # Azure Web App / Function
      webapp-name:
        type: string
        required: false
        default: ''
      resource-group:
        type: string
        required: false
        default: ''
      # Runner
      container-image-name-runner:
        type: string
        required: false
        default: ''
      container-image-resource-runner:
        type: string
        required: false
        default: '--cpus 4 -m 8g'
      enable-build:
        type: boolean
        required: false
        default: true
    secrets:
      github-token:
        required: true

jobs:
  setup:
    name: Setup
    runs-on: arc-mobile
    outputs:
      app-version: ${{ steps.setup-android.outputs.app-version }}
      app-name: ${{ steps.setup-android.outputs.app-name }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup Environment
        id: setup-android
        uses: cvch29/platform-actions/actions/shared/setup-maven@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pom-path: "pom.xml"

