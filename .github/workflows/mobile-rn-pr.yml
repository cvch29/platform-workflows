name: 'Mobile React Native — PR'

on:
  workflow_call:
    inputs:
      technology:
        description: 'react-native | native'
        type: string
        required: true
      node-build-path:
        type: string
        default: .
      environment:
        type: string
        default: dev
      keystore_path:
        type: string
        default: android-keystore.jks
      command:
        type: string
        default: assembleRelease
      configuration:
        type: string
        default: Release
      p12-file:
        type: string
        default: ios-certificate.p12
      profile-name:
        type: string
        default: 'profile-saveio-as'
      profile-type:
        description: 'Tipo de perfil: appstore | dev | cert'
        type: string
        default: 'appstore'
      enable-android:
        type: boolean
        default: false
      enable-ios:
        type: boolean
        default: true
    secrets:
      keystore-base64:
        required: false
      keystore-password:
        required: false
      keystore-alias:
        required: false
      keystore-path:
        required: false
      github-token:
        required: true
      p12-base64:
        required: false
      p12-password:
        required: false
      apple-api-key-id:
        required: false
      apple-api-issuer-id:
        required: false
      apple-api-key-base64:
        required: false

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      app-version: ${{ steps.setup-android.outputs.app-version }}
      app-name: ${{ steps.setup-android.outputs.app-name }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Environment
        id: setup-android
        uses: cvch29/platform-actions/actions/shared/setup-node@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          node-build-path: ${{ inputs.node-build-path }}

  pr-validate:
    name: "PR Validate"
    needs: setup
    uses: cvch29/platform-workflows/.github/workflows/shared-pr-validation.yml@main
    with:
      app-name: ${{ needs.setup.outputs.app-name }}
      runtime: react-native

  # js-checks:
  #   name: JS Lint & Test
  #   needs: pr-validate
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: cvch29/platform-actions/actions/shared/checkout@main
  #     - uses: cvch29/platform-actions/actions/tooling-v2/node/install@main
  #       with:
  #         node-version: ${{ inputs.node-version }}
  #         package-manager: ${{ inputs.package-manager }}
  #     - name: TypeScript & Lint
  #       shell: bash
  #       run: |
  #         ${{ inputs.package-manager }} run tsc --noEmit 2>/dev/null || true
  #         ${{ inputs.package-manager }} run lint 2>/dev/null || true
  #     - uses: cvch29/platform-actions/actions/tooling/node/test@main
  #       with:
  #         package-manager: ${{ inputs.package-manager }}
  #         coverage: true
  #         coverage-threshold: 70

  security:
    needs: [setup]
    uses: cvch29/platform-workflows/.github/workflows/shared-security-scan.yml@main
    with:
      app-name: ${{ needs.setup.outputs.app-name }}
      language: javascript
      run-codeql: false
      run-sca: false
      run-secrets: true
      run-sast: false
    permissions:
      contents: read
      security-events: write

  quality:
    # name: Code Quality Scan
    needs: [setup]
    uses: cvch29/platform-workflows/.github/workflows/shared-quality-scan.yml@main
    with:
      app-name: ${{ needs.setup.outputs.app-name }}
      language: kotlin
      app-version: ${{ needs.setup.outputs.app-version }}
      container-image-name-runner: "${{ vars.REGISTRY }}/${{ vars.CONTAINER_IMAGE_SONAR }}"
      container-image-resource-runner: "--cpus 2 -m 4g"
      # sonar-host-url: ${{ secrets.sonar-host-url }}
      sonar-project-key: "saveio"
      # sonar-token: ${{ secrets.sonar-token }}
