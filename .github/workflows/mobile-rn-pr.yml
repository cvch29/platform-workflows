name: 'Mobile React Native — PR'

on:
  workflow_call:
    inputs:
      technology:
        description: 'react-native | native'
        type: string
        required: true
      node-build-path:
        type: string
        default: .
      environment:
        type: string
        default: dev
      keystore_path:
        type: string
        default: android-keystore.jks
      command:
        type: string
        default: assembleRelease
      configuration:
        type: string
        default: Release
      p12-file:
        type: string
        default: ios-certificate.p12
      profile-name:
        type: string
        default: 'profile-saveio-as'
      profile-type:
        description: 'Tipo de perfil: appstore | dev | cert'
        type: string
        default: 'appstore'
      enable-android:
        type: boolean
        default: false
      enable-ios:
        type: boolean
        default: true
    secrets:
      keystore-base64:
        required: false
      keystore-password:
        required: false
      keystore-alias:
        required: false
      keystore-path:
        required: false
      github-token:
        required: true
      p12-base64:
        required: false
      p12-password:
        required: false
      apple-api-key-id:
        required: false
      apple-api-issuer-id:
        required: false
      apple-api-key-base64:
        required: false

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      app-version: ${{ steps.setup-android.outputs.app-version }}
      app-name: ${{ steps.setup-android.outputs.app-name }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup Environment
        id: setup-android
        uses: cvch29/platform-actions/actions/shared/setup-node@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          node-build-path: ${{ inputs.node-build-path }}

