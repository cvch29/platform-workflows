name: 'Library Maven — PR'

on:
  workflow_call:
    inputs:
      app-name:
        type: string
        required: true
      java-version:
        type: string
        default: '17'
      sonar-project-key:
        type: string
        required: false
        default: ''
    secrets:
      sonar-token:
        required: false

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      app-version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin
          cache: maven
      - id: v
        run: |
          echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT
        shell: bash

  pr-validate:
    needs: setup
    uses: cvch29/platform-workflows/.github/workflows/shared-pr-validation.yml@main
    with:
      app-name: ${{ inputs.app-name }}
      runtime: java

  build-test:
    needs: pr-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin
          cache: maven
      - run: mvn clean verify --batch-mode
        shell: bash

  quality:
    needs: setup
    if: inputs.sonar-project-key != ''
    uses: cvch29/platform-workflows/.github/workflows/shared-quality-scan.yml@main
    with:
      app-name: ${{ inputs.app-name }}
      app-version: ${{ needs.setup.outputs.app-version }}
      language: java
      sonar-project-key: ${{ inputs.sonar-project-key }}
      container-image-name-runner: ''
      container-image-resource-runner: '--cpus 2 -m 4g'
    secrets:
      sonar-token: ${{ secrets.sonar-token }}
