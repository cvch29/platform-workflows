name: 'Library Maven — Release'

on:
  workflow_call:
    inputs:
      app-name:
        type: string
        required: true
      java-version:
        type: string
        default: '17'
      server-id:
        type: string
        required: true
      registry-url:
        type: string
        required: false
        default: ''
    secrets:
      server-username:
        required: true
      server-password:
        required: true
      github-token:
        required: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      app-version: ${{ steps.v.outputs.version }}
      app-name:    ${{ steps.v.outputs.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin
          cache: maven
      - id: v
        shell: bash
        run: |
          echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT
          echo "name=${{ inputs.app-name }}"                                                >> $GITHUB_OUTPUT

  build:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cvch29/platform-actions/actions/domains/backend/maven-library/build@main
        with:
          java-version: ${{ inputs.java-version }}
          skip-tests: 'false'

  scs:
    needs: [setup, build]
    uses: cvch29/platform-workflows/.github/workflows/shared-supply-chain-security.yml@main
    with:
      app-name: ${{ needs.setup.outputs.app-name }}

  publish:
    name: Publish to Maven Registry
    needs: [setup, build, scs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cvch29/platform-actions/actions/domains/backend/maven-library/publish@main
        with:
          java-version:    ${{ inputs.java-version }}
          server-id:       ${{ inputs.server-id }}
          server-username: ${{ secrets.server-username }}
          server-password: ${{ secrets.server-password }}
          registry-url:    ${{ inputs.registry-url }}

  artifact-release:
    needs: [setup, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cvch29/platform-actions/actions/shared/artifact-release-tag@main
        with:
          github-token: ${{ secrets.github-token }}
          app-version:  ${{ needs.setup.outputs.app-version }}
