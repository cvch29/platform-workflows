name: 'Mobile iOS — Release'

on:
  workflow_call:
    inputs:
      technology:
        description: 'react-native | native'
        type: string
        required: true
        default: native
      node-build-path:
        type: string
        default: .
      environment:
        type: string
        default: dev
      configuration:
        type: string
        default: Release
      p12-file:
        type: string
        default: ios-certificate.p12
      profile-name:
        type: string
        default: 'profile-saveio-as'
      profile-type:
        description: 'Tipo de perfil: appstore | dev | cert'
        type: string
        default: 'appstore'
      enable-ios:
        type: boolean
        default: true
    secrets:
      github-token:
        required: true
      p12-base64:
        required: false
      p12-password:
        required: false
      apple-api-key-id:
        required: false
      apple-api-issuer-id:
        required: false
      apple-api-key-base64:
        required: false

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      app-version: ${{ steps.setup-android.outputs.app-version }}
      app-name: ${{ steps.setup-android.outputs.app-name }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup Environment
        id: setup-android
        uses: cvch29/platform-actions/actions/domains/mobile/android/setup@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          build-gradle-path: ${{ inputs.gradle-build-path }}
          
  build_ios:
    needs: setup
    name: Build iOS
    uses: cvch29/platform-workflows/.github/workflows/mobile-ios-build.yml@main
    with:
      technology: ${{ inputs.technology }}
      app-version: ${{ needs.setup.outputs.app-version }}
      app-name: ${{ needs.setup.outputs.app-name }}
      enable-ios: "${{ inputs.enable-ios }}"
      configuration: ${{ inputs.configuration }}
      p12-file: ${{ inputs.p12-file }}
      profile-name: ${{ inputs.profile-name }}
      profile-type: ${{ inputs.profile-type }}
    secrets:
      p12-base64: ${{ secrets.p12-base64 }}
      p12-password: ${{ secrets.p12-password }}
      apple-api-key-id: ${{ secrets.apple-api-key-id }}
      apple-api-issuer-id: ${{ secrets.apple-api-issuer-id }}
      apple-api-key-base64: ${{ secrets.apple-api-key-base64 }}
      ixguard-license-key: ${{ secrets.ixguard-license-key }}


  scs:
    needs: [setup,build_ios]
    # name: Supply Chain Security
    uses: cvch29/platform-workflows/.github/workflows/shared-supply-chain-security.yml@main
    with:
      app-name: ${{ needs.setup.outputs.app-name }}
      artifact-path: "/__w/challenge-mbco/challenge-mbco/artifacts"
      container-image-name-runner: "${{ vars.REGISTRY }}/android:${{ vars.CONTAINER_IMAGE_TAG_SCS }}"
      container-image-resource-runner: "--cpus 2 -m 4g"

  artifact_release:
    needs: [setup, build_ios,scs]
    name: Artifact Release
    uses: cvch29/platform-workflows/.github/workflows/shared-release-tag.yml@main
    with:
      app-name: ${{ needs.setup.outputs.app-name }}
      app-version: ${{ needs.setup.outputs.app-version }}
      version-strategy: semver
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

