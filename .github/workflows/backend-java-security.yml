name: 'Backend Java — Security Audit'

on:
  workflow_call:
    inputs:
      app-name:
        type: string
        required: true
      severity-threshold:
        type: string
        required: false
        default: 'high'

jobs:
  full-security:
    uses: cvch29/platform-workflows/.github/workflows/shared-security-scan.yml@main
    with:
      app-name: ${{ inputs.app-name }}
      language: java
      run-codeql: true
      run-sast: true
      run-sca: true
      run-secrets: true
      severity-threshold: ${{ inputs.severity-threshold }}
    permissions:
      contents: read
      security-events: write
