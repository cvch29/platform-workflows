name: 'Mobile iOS — PR'

on:
  workflow_call:
    inputs:
      app-name:
        type: string
        required: true
      scheme:
        type: string
        required: true
      workspace:
        type: string
        required: false
        default: ''
      project:
        type: string
        required: false
        default: ''
      run-unit-tests:
        type: boolean
        required: false
        default: true

jobs:
  pr-validate:
    uses: cvch29/platform-workflows/.github/workflows/shared-pr-validation.yml@main
    with:
      app-name: ${{ inputs.app-name }}
      runtime: swift
      skip-dependency-review: true

  build-test:
    name: Build & Test
    needs: pr-validate
    runs-on: macos-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: cvch29/platform-actions/.github/actions/shared/checkout@main
      - name: Install CocoaPods
        if: hashFiles('Podfile') != ''
        uses: ruby/setup-ruby@main
        with:
          ruby-version: '3.2'
          bundler-cache: true
      - name: pod install
        if: hashFiles('Podfile') != ''
        shell: bash
        run: bundle exec pod install --repo-update
      - uses: cvch29/platform-actions/.github/actions/mobile/ios/build@main
        with:
          scheme: ${{ inputs.scheme }}
          workspace: ${{ inputs.workspace }}
          project: ${{ inputs.project }}
          configuration: Debug
          destination: 'platform=iOS Simulator,name=iPhone 15'
      - name: Run unit tests
        if: inputs.run-unit-tests
        shell: bash
        run: |
          SRC="${{ inputs.workspace != '' && format('-workspace {0}', inputs.workspace) || format('-project {0}', inputs.project) }}"
          xcodebuild test $SRC \
            -scheme "${{ inputs.scheme }}" \
            -destination "platform=iOS Simulator,name=iPhone 15" \
            -resultBundlePath TestResults | xcpretty

  security:
    needs: pr-validate
    runs-on: ubuntu-latest
    uses: cvch29/platform-workflows/.github/workflows/shared-security-scan.yml@main
    with:
      app-name: ${{ inputs.app-name }}
      language: swift
      run-codeql: false
      run-sca: false
      run-secrets: true
      run-sast: false
    permissions:
      contents: read
      security-events: write
