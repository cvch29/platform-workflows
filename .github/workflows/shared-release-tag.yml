name: 'Shared — Release Tag'

on:
  workflow_call:
    inputs:
      app-name:
        type: string
        required: true
      app-version:
        type: string
        required: true
      version-strategy:
        description: 'semver | calver'
        type: string
        required: false
        default: 'semver'
      create-github-release:
        type: boolean
        required: false
        default: true
    # outputs:
    #   version:
    #     value: ${{ jobs.tag.outputs.version }}
    #   version-bare:
    #     value: ${{ jobs.tag.outputs.version-bare }}
    secrets:
      github-token:
        required: true

jobs:
  tag:
    name: Tag Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # outputs:
    #   version: ${{ steps.version.outputs.version }}
    #   version-bare: ${{ steps.version.outputs.version-bare }}

    steps:
      - uses: cvch29/platform-actions/actions/shared/checkout@main
        with:
          fetch-depth: 0

      # - name: Calculate version
      #   id: version
      #   uses: cvch29/platform-actions/actions/intelligence/versioning@main
      #   with:
      #     strategy: ${{ inputs.version-strategy }}

      - name: Create Git tag
        env:
          GITHUB_TOKEN: ${{ secrets.github-token }}
        shell: bash
        run: |
          git config user.name "platform-bot"
          git config user.email "platform-bot@mybank.com"
          git tag -a "${{ inputs.app-version }}" \
            -m "Release ${{ inputs.app-version }} — ${{ inputs.app-name }}"
          git push origin "${{ inputs.app-version }}"

      # - name: Create GitHub Release
      #   if: inputs.create-github-release && steps.version.outputs.is-release == 'true'
      #   uses: softprops/action-gh-release@v2
      #   with:
      #     tag_name: ${{ inputs.app-version }}
      #     name: "${{ inputs.app-name }} ${{ inputs.app-version }}"
      #     body: |
      #       ## Changes
      #       ${{ steps.version.outputs.changelog }}

      #       **CI Run:** [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
      #     prerelease: ${{ steps.version.outputs.is-release != 'true' }}
