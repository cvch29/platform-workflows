name: 'Backend Node — Release'

on:
  workflow_call:
    inputs:
      app-name:
        type: string
        required: true
      environment:
        type: string
        default: 'dev'
      deploy-target:
        description: 'aks | azure-webapp | azure-function'
        type: string
        required: true
      node-version:
        type: string
        default: '20'
      package-manager:
        type: string
        default: 'yarn'
      acr-registry:
        type: string
        required: false
        default: ''
      aks-cluster-name:
        type: string
        required: false
        default: ''
      aks-resource-group:
        type: string
        required: false
        default: ''
      helm-values-file:
        type: string
        required: false
        default: ''
      webapp-name:
        type: string
        required: false
        default: ''
      resource-group:
        type: string
        required: false
        default: ''
      container-image-name-runner:
        type: string
        required: false
        default: ''
    secrets:
      github-token:
        required: true

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      app-version: ${{ steps.version.outputs.version }}
      app-name: ${{ steps.version.outputs.name }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version" 2>/dev/null || echo "0.0.0")
          echo "version=$VERSION"           >> $GITHUB_OUTPUT
          echo "name=${{ inputs.app-name }}" >> $GITHUB_OUTPUT

  build:
    name: Build
    needs: setup
    runs-on: ubuntu-latest
    outputs:
      image-ref: ${{ steps.build.outputs.image-ref }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        if: inputs.deploy-target == 'aks'
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Build
        id: build
        uses: cvch29/platform-actions/.github/actions/domains/backend/node/build@main
        with:
          docker-build:   ${{ inputs.deploy-target == 'aks' && 'true' || 'false' }}
          acr-registry:   ${{ inputs.acr-registry }}
          acr-image-name: ${{ needs.setup.outputs.app-name }}
          image-tag:      ${{ needs.setup.outputs.app-version }}
      - uses: cvch29/platform-actions/.github/actions/shared/artifact-manage@main
        if: inputs.deploy-target != 'aks'
        with:
          app-name:    ${{ needs.setup.outputs.app-name }}
          app-version: ${{ needs.setup.outputs.app-version }}
          path: dist
          pattern: '**/*'
          name: node-build-${{ github.run_id }}
          retention-days: 1
          if-no-files-found: warn

  scs:
    needs: [setup, build]
    uses: cvch29/platform-workflows/.github/workflows/shared-supply-chain-security.yml@main
    with:
      app-name: ${{ needs.setup.outputs.app-name }}
      container-image-name-runner: ${{ inputs.container-image-name-runner }}

  deploy:
    name: Deploy → ${{ inputs.environment }}
    needs: [setup, build, scs]
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy to AKS
        if: inputs.deploy-target == 'aks'
        uses: cvch29/platform-actions/.github/actions/domains/backend/node/deploy/aks@main
        with:
          app-name:          ${{ needs.setup.outputs.app-name }}
          environment:       ${{ inputs.environment }}
          image-tag:         ${{ needs.setup.outputs.app-version }}
          acr-registry:      ${{ inputs.acr-registry }}
          aks-cluster-name:  ${{ inputs.aks-cluster-name }}
          aks-resource-group: ${{ inputs.aks-resource-group }}
          helm-values-file:  ${{ inputs.helm-values-file }}
      - name: Download + Deploy to Web App/Function
        if: inputs.deploy-target != 'aks'
        shell: bash
        run: echo "Deploy to ${{ inputs.deploy-target }} — download artifact and deploy"
      - uses: cvch29/platform-actions/.github/actions/governance/audit-log@main
        if: always()
        with:
          event-type:  deploy
          environment: ${{ inputs.environment }}
          outcome:     ${{ job.status }}
          app-name:    ${{ needs.setup.outputs.app-name }}

  artifact-release:
    needs: [setup, deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cvch29/platform-actions/.github/actions/shared/artifact-release-tag@main
        with:
          github-token: ${{ secrets.github-token }}
          app-version:  ${{ needs.setup.outputs.app-version }}
