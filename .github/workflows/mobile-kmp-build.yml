name: 'Mobile KMP — Build'

on:
  workflow_call:
    inputs:
      app-name:
        type: string
        required: true
      targets:
        type: string
        required: false
        default: 'android,ios'
      java-version:
        type: string
        required: false
        default: '17'
      build-type:
        type: string
        required: false
        default: 'release'
    outputs:
      android-aar:
        value: ${{ jobs.build.outputs.android-aar }}
      ios-framework:
        value: ${{ jobs.build.outputs.ios-framework }}

jobs:
  build:
    name: KMP Build
    runs-on: ${{ contains(inputs.targets, 'ios') && 'macos-latest' || 'ubuntu-latest' }}
    outputs:
      android-aar: ${{ steps.build.outputs.android-aar }}
      ios-framework: ${{ steps.build.outputs.ios-framework }}
    steps:
      - uses: cvch29/platform-actions/.github/actions/shared/checkout@main
      - uses: cvch29/platform-actions/.github/actions/tooling-v2/kmp/setup@main
        with:
          java-version: ${{ inputs.java-version }}
          targets: ${{ inputs.targets }}
      - id: build
        uses: cvch29/platform-actions/.github/actions/tooling-v2/kmp/build@main
        with:
          targets: ${{ inputs.targets }}
          build-type: ${{ inputs.build-type }}
      - uses: cvch29/platform-actions/.github/actions/governance/sbom@main
        with:
          artifact-path: .
          upload-artifact: true
      - uses: cvch29/platform-actions/.github/actions/shared/artifact-upload@main
        with:
          name: kmp-build-${{ inputs.app-name }}
          path: |
            **/build/outputs/**/*.aar
            **/*.xcframework
          retention-days: 30
