name: 'Mobile React Native — Release'

on:
  workflow_call:
    inputs:
      technology:
        description: 'react-native | native'
        type: string
        required: true
      node-build-path:
        type: string
        default: .
      environment:
        type: string
        default: dev
      keystore_path:
        type: string
        default: android-keystore.jks
      command:
        type: string
        default: assembleRelease
      configuration:
        type: string
        default: Release
      p12-file:
        type: string
        default: ios-certificate.p12
      profile-name:
        type: string
        default: 'profile-saveio-as'
      profile-type:
        description: 'Tipo de perfil: appstore | dev | cert'
        type: string
        default: 'appstore'
      enable-android:
        type: boolean
        default: false
      enable-ios:
        type: boolean
        default: true
    secrets:
      keystore-base64:
        required: false
      keystore-password:
        required: false
      keystore-alias:
        required: false
      keystore-path:
        required: false
      github-token:
        required: true
      p12-base64:
        required: false
      p12-password:
        required: false
      apple-api-key-id:
        required: false
      apple-api-issuer-id:
        required: false
      apple-api-key-base64:
        required: false
jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      app-version: ${{ steps.setup-android.outputs.app-version }}
      app-name: ${{ steps.setup-android.outputs.app-name }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup Environment
        id: setup-android
        uses: cvch29/platform-actions/actions/shared/setup-node@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          node-build-path: ${{ inputs.node-build-path }}

  build_android:
    needs: setup
    # name: Build Android
    uses: cvch29/platform-workflows/.github/workflows/mobile-android-build.yml@main
    with:
      app-name: ${{ needs.setup.outputs.app-name }}
      app-version: ${{ needs.setup.outputs.app-version }}
      command: ${{ inputs.command }}
      enable-android: ${{ inputs.enable-android }}
      technology: ${{ inputs.technology }}
      container-image-name-runner: "${{ vars.REGISTRY }}/android:${{ vars.CONTAINER_IMAGE_TAG_BUILD }}"
      container-image-resource-runner: "--cpus 10 -m 12g"
      sign: true
    secrets:
      keystore-base64: ${{ secrets.keystore-base64 }}
      keystore-password: ${{ secrets.keystore-password }}
      keystore-alias: ${{ secrets.keystore-alias }}
      keystore-path: ${{ secrets.keystore-path }}

  build_ios:
    needs: setup
    # name: Build iOS
    uses: cvch29/platform-workflows/.github/workflows/mobile-ios-build.yml@main
    with:
      technology: ${{ inputs.technology }}
      app-version: ${{ needs.setup.outputs.app-version }}
      app-name: ${{ needs.setup.outputs.app-name }}
      enable-ios: ${{ inputs.enable-ios }}
      configuration: ${{ inputs.configuration }}
      p12-file: ${{ inputs.p12-file }}
      profile-name: ${{ inputs.profile-name }}
      profile-type: ${{ inputs.profile-type }}
    secrets:
      p12-base64: ${{ secrets.p12-base64 }}
      p12-password: ${{ secrets.p12-password }}
      apple-api-key-id: ${{ secrets.apple-api-key-id }}
      apple-api-issuer-id: ${{ secrets.apple-api-issuer-id }}
      apple-api-key-base64: ${{ secrets.apple-api-key-base64 }}
      ixguard-license-key: ${{ secrets.ixguard-license-key }}

  artifact_integrity:
    needs: [setup,build_android,build_ios]
    # name: Release Integrity
    uses: cvch29/platform-workflows/.github/workflows/shared-release-integrity.yml@main
    with:
      app-name: ${{ needs.setup.outputs.app-name }}
      artifact-path: "/__w/challenge-mbco/challenge-mbco/artifacts"
      container-image-name-runner: "${{ vars.REGISTRY }}/android:${{ vars.CONTAINER_IMAGE_TAG_SCS }}"
      container-image-resource-runner: "--cpus 2 -m 4g"

  distribute:
    name: Distribute
    needs: [artifact_integrity]
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Distribute to Firebase App Distribution
        uses: cvch29/platform-actions/actions/domains/mobile/android/distribute/firebase-app@main
        with:
          app_id: 1:432490436563:android:fee35c44f2f2ccf59b4126
          apk_path: "artifacts/android/app/build/outputs/apk/release/${{ inputs.app-name }}-${{ inputs.app-version }}.apk"
          release_notes: 'Automated distribution from GitHub Actions'

      - name: Artifact Release
        uses: cvch29/platform-actions/actions/shared/artifact-release-tag@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          app-version: ${{ inputs.app-version }}