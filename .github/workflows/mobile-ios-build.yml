name: 'Mobile iOS — Build'

on:
  workflow_call:
    inputs:
      technology:
        description: 'react-native | native'
        type: string
        required: true
        default: 'native'
      app-name:
        type: string
        required: true
      app-version:
        type: string
        required: true
      scheme:
        type: string
        required: false
        default: 'SaveIO'
      configuration:
        type: string
        required: false
        default: 'Release'
      p12-file:
        type: string
        required: false
        default: ios-certificate.p12
      profile-name:
        type: string
        required: false
        default: 'profile-saveio-as'
      profile-type:
        description: 'Tipo de perfil: appstore | dev | cert'
        type: string
        required: false
        default: 'appstore'
      enable-ios:
        type: boolean
        required: false
        default: false
    secrets:
      p12-base64:
        required: true
      p12-password:
        required: true
      apple-api-key-id:
        required: true
      apple-api-issuer-id:
        required: true
      apple-api-key-base64:
        required: true
      ixguard-license-key:
        required: false

jobs:
  build:
    if: success() && (inputs.enable-ios == true)
    name: Build iOS
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: cvch29/platform-actions/.github/actions/shared-v2/checkout@main

      - name: Setup Keychain
        id: setup-keychain
        uses: cvch29/platform-actions/.github/actions/shared-v2/setup-certificate@main
        with:
          certificate-base64: ${{ secrets.p12-base64 }}
          certificate-file: ${{ inputs.p12-file }}

      - name: Validate P12 Private Key
        id: validate-p12
        uses: cvch29/platform-actions/.github/actions/domains/mobile/ios/config/validate-private-key-p12@main
        with:
          p12-base64: ${{ secrets.p12-base64 }}
          p12-password: ${{ secrets.p12-password }}
          
      - name: Show build Configuration
        id: xcode-build-settings
        uses: cvch29/platform-actions/.github/actions/domains/mobile/ios/config/xcode-build-settings@main
        with:
          scheme: "SaveIO"
          configuration: ${{ inputs.configuration }}
          working-directory: "ios"

      - name: Validate Apple API Key
        run: |
          echo "${{ secrets.apple-api-key-base64 }}" | base64 -d | openssl pkey -noout -text
        shell: bash

      - name: Download provisioning profile
        id: download-pp
        uses: cvch29/platform-actions/.github/actions/domains/mobile/ios/config/apple-download-provisioning-profile@main
        with:
          apple-api-key-id: ${{ secrets.apple-api-key-id }}
          apple-api-issuer-id: ${{ secrets.apple-api-issuer-id }}
          apple-api-key-base64: ${{ secrets.apple-api-key-base64 }}
          profile-name: ${{ inputs.profile-name }}
          app-identifier: ${{ steps.xcode-build-settings.outputs.product-bundle-identifier }}
          profile-type: ${{ inputs.profile-type }}
          team-id: ${{ steps.validate-p12.outputs.development-team }}

      - name: Validate provisioning profile
        id: validate-pp
        uses: cvch29/platform-actions/.github/actions/domains/mobile/ios/config/validate-provisioning-profile@main
        with:
          prov-profile-path: ${{ steps.download-pp.outputs.provisioning-profile-path }} 
          validate-cer: true
          fingerprint: ${{ steps.validate-p12.outputs.p12-fingerprint }}

      - name: Install Apple Private Key
        uses: cvch29/platform-actions/.github/actions/domains/mobile/ios/config/install-apple-private-key-p12@main
        with:
          p12-base64: ${{ secrets.p12-base64 }}
          p12-password: ${{ secrets.p12-password }}
      
      # - name: Instalar perfil de aprovisionamiento
      #   # if: ${{ inputs.provisioning-profile-base64 != '' }}
      #   uses: cvch29/platform-actions/.github/actions/domains/mobile/ios/config/install-apple-provisioning-profile@main
      #   with:
      #     provisioning-profile-base64: ${{ secrets.provisioning-profile-base64 }}
      #     bundle-id: ${{ inputs.bundle-id }}

      # - name: Instalar Apple Provisioning Profile
      #   env:
      #     BUILD_PROVISION_PROFILE_BASE64: "${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}"
      #   run: |
      #     # PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
      #     # echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode --output $PP_PATH
      #     # mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
      #     cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      # - name: Delete Provision Profile
      #   run: rm -f ~/Library/MobileDevice/Provisioning\ Profiles/build_pp.mobileprovision
      #   if: always()

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp ${{ steps.download-pp.outputs.provisioning-profile-path }} \
            ~/Library/MobileDevice/Provisioning\ Profiles/${{ steps.validate-pp.outputs.prov-profile-uuid }}.mobileprovision
          echo "Perfil instalado:"
          ls ~/Library/MobileDevice/Provisioning\ Profiles/

      # - name: Configurar keychain en sistema
      #   run: |
      #     security list-keychains -d user -s ${{ env.KEYCHAIN_PATH }} ~/Library/Keychains/login.keychain-db
      #     security default-keychain -s ${{ env.KEYCHAIN_PATH }}
      #     security unlock-keychain -p ${{ env.KEYCHAIN_PASSWORD }} ${{ env.KEYCHAIN_PATH }}
      #     echo "Keychains configurados:"
      #     security list-keychains -d user

      - name: Install Dependencies
        if: ${{ inputs.technology == 'react-native' }}
        uses: cvch29/platform-actions/.github/actions/tooling/node@main
        with:
          working-directory: .
        
      # - name: Actualizar versión
      #   uses: cvch29/platform-actions/.github/actions/domains-v2/mobile/ios/build@main
      #   with:
      #     scheme: ${{ inputs.scheme }}
      #     workspace: ${{ inputs.workspace }}
      #     export-method: ${{ inputs.export-method }}
      #     options: |
      #       MARKETING_VERSION=${{ inputs.app-version }}
      #       CURRENT_PROJECT_VERSION=${{ inputs.app-version }}

      # - name: Configurar Proyecto para IxGuard
      #   if: ${{ env.IXGUARD_ENABLED == 'true' }}
      #   uses: cvch29/platform-actions/.github/actions/domains/mobile/ios/config/xcode-configure-ixguard-toolchain@main
      #   with:
      #     workspace: ${{ inputs.workspace }}
      #     scheme: ${{ inputs.scheme }}
      #     target: ${{ inputs.target }}

      # - name: Configurar IxGuard Toolchain
      #   if: ${{ env.IXGUARD_ENABLED == 'true' }}
      #   uses: cvch29/platform-actions/.github/actions/domains/mobile/ios/config/xcode-configure-ixguard-toolchain@main
      #   with:
      #     workspace: ${{ inputs.workspace }}
      #     scheme: ${{ inputs.scheme }}
      #     target: ${{ inputs.target }}

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Configure Xcode Build Settings
        uses: cvch29/platform-actions/.github/actions/domains/mobile/ios/config/xcode-configure-settings@main
        with:
          project: ${{ steps.xcode-build-settings.outputs.project-file-path }}
          target: SaveIO
          configuration: ${{ inputs.configuration }}
          options: |
            PROVISIONING_PROFILE_SPECIFIER=${{ inputs.profile-name }}
            DEVELOPMENT_TEAM=${{ steps.validate-p12.outputs.development-team }}
            CODE_SIGN_IDENTITY=${{ steps.validate-p12.outputs.code-sign-identity}}
            CODE_SIGN_STYLE=Manual
            CODE_SIGNING_REQUIRED=YES
            OTHER_CODE_SIGN_FLAGS=--keychain=${{ steps.setup-keychain.outputs.keychain-path }}

      - name: Generate .archive
        id: build
        uses: cvch29/platform-actions/.github/actions/domains/mobile/ios/config/fastlane-generate-archive@main
        with:
          scheme: SaveIO
          workspace: ${{ steps.xcode-build-settings.outputs.workspace-path }}
          configuration: ${{ inputs.configuration }}
          
      # - name: Ofuscar .archive con IxGuard
      #   if: ${{ env.IXGUARD_ENABLED == 'true' }}
      #   uses: cvch29/platform-actions/.github/actions/domains/mobile/ios/config/ixguard-obfuscate@main
      #   with:
      #     archive: ${{ steps.build.outputs.archive-path }}
      #     configuration: ${{ inputs.configuration }}
      #     license-base64: ${{ secrets.ixguard-license-key }}

      - name: Export .ipa
        id: export-ipa
        uses: cvch29/platform-actions/.github/actions/domains/mobile/ios/config/fastlane-export-archive@main
        with:
          scheme: "SaveIO"
          workspace: ${{ steps.xcode-build-settings.outputs.workspace-path }}
          archive: ${{ steps.build.outputs.archive-path }}
          export-type: prod
          app-identifier: ${{ steps.xcode-build-settings.outputs.product-bundle-identifier }}
          prov-profile: ${{ inputs.profile-name }}

      - name: Upload Artifacts
        uses: cvch29/platform-actions/.github/actions/shared/artifact-manage@main
        with:
          app-name: ${{ inputs.app-name }}
          app-version: ${{ inputs.app-version }}
          path: ios
          pattern: |
            ${{ steps.export-ipa.outputs.ipa-path }}
          name: ios-release-files
          retention-days: 1
          if-no-files-found: warn
          compression-level: 6

      # - name: Upload Artifact
      #   uses: cvch29/platform-actions/.github/actions/shared-v2/artifact-upload@main
      #   with:
      #     name: ios-ipa-${{ inputs.app-name }}
      #     path: ${{ steps.export-ipa.outputs.ipa-path }}
      #     retention-days: 1
