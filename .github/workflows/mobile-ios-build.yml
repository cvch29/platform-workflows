name: 'Mobile iOS — Build'

on:
  workflow_call:
    inputs:
      technology:
        description: 'react-native | native'
        type: string
        required: true
        default: 'native'
      app-name:
        type: string
        required: true
      app-version:
        type: string
        required: true
      scheme:
        type: string
        required: true
      workspace:
        type: string
        required: false
        default: ''
      bundle-id:
        type: string
        required: true
      export-method:
        description: 'app-store | ad-hoc | enterprise'
        type: string
        required: false
        default: 'app-store'
    # outputs:
    #   ipa-path:
    #     value: ${{ jobs.build.outputs.ipa-path }}
    secrets:
      p12-base64:
        required: true
      p12-password:
        required: true
      provisioning-profile-base64:
        required: true

jobs:
  build:
    name: Build iOS
    runs-on: macos-latest
    permissions:
      contents: read
    # outputs:
    #   ipa-path: ${{ steps.build.outputs.ipa-path }}
    steps:
      - uses: cvch29/platform-actions/.github/actions/shared-v2/checkout@main


      - name: Setup Keychain
        uses: cvch29/platform-actions/.github/actions/domains-v2/mobile/ios/sign@main
        with:
          p12-base64: ${{ secrets.p12-base64 }}
          p12-password: ${{ secrets.p12-password }}
          provisioning-profile-base64: ${{ secrets.provisioning-profile-base64 }}
          bundle-id: ${{ inputs.bundle-id }}

      - name: Mostrar configuración de compilación
        uses: cvch29/platform-actions/.github/actions/domains-v2/mobile/ios/build@main
        with:
          scheme: ${{ inputs.scheme }}
          workspace: ${{ inputs.workspace }}
          export-method: ${{ inputs.export-method }}
          show-build-settings: true

      - name: Definir perfil de aprovisionamiento
        if: ${{ inputs.provisioning-profile-base64 != '' }}
        run: |
          echo "PROFILE_NAME=$(security cms -D -i provisioning-profile.mobileprovision | plutil -extract 'UUID' xml1 -o - - | xmllint --xpath 'string(//plist/string)' -)" >> $GITHUB_ENV
        
      - name: Definir tipo de perfil de aprovisionamiento
        if: ${{ inputs.provisioning-profile-base64 != '' }}
        run: |
          PROFILE_TYPE=$(security cms -D -i provisioning-profile.mobileprovision | plutil -extract 'Entitlements' xml1 -o - - | xmllint --xpath 'string(//plist/dict/key[.="com.apple.developer.team-identifier"]/following-sibling::string[1])' -)
          echo "PROFILE_TYPE=$PROFILE_TYPE" >> $GITHUB_ENV
          echo "EXPORT_TYPE=$PROFILE_TYPE" >> $GITHUB_ENV

      - name: Descargar perfil de aprovisionamiento
        if: ${{ inputs.provisioning-profile-base64 != '' }}
        uses: cvch29/platform-actions/.github/actions/domains-v2/mobile/ios/provisioning-profile-download@main
        with:
          profile-name: ${{ env.PROFILE_NAME }}
          profile-type: ${{ env.PROFILE_TYPE }}
          app-identifier: ${{ inputs.bundle-id }}

      - name: Validar perfil de aprovisionamiento
        if: ${{ inputs.provisioning-profile-base64 != '' }}
        uses: cvch29/platform-actions/.github/actions/domains-v2/mobile/ios/provisioning-profile-validate@main
        with:
          prov-profile-path: provisioning-profile.mobileprovision
          validate-cer: true
          fingerprint: ${{ secrets.p12-fingerprint }}

      - name: Instalar llave privada de apple
        uses: cvch29/platform-actions/.github/actions/domains-v2/mobile/ios/sign@main
        with:
          p12-base64: ${{ secrets.p12-base64 }}
          p12-password: ${{ secrets.p12-password }}

      - name: Instalar perfil de aprovisionamiento
        if: ${{ inputs.provisioning-profile-base64 != '' }}
        uses: cvch29/platform-actions/.github/actions/domains-v2/mobile/ios/sign@main
        with:
          provisioning-profile-base64: ${{ secrets.provisioning-profile-base64 }}
          bundle-id: ${{ inputs.bundle-id }}

      - name: Install Dependencies
        if: ${{ inputs.technology == 'react-native' }}
        uses: cvch29/platform-actions/.github/actions/tooling/node@main
        with:
          working-directory: .
        
      - name: Configurar proyecto
        uses: cvch29/platform-actions/.github/actions/domains-v2/mobile/ios/build@main
        with:
          scheme: ${{ inputs.scheme }}
          workspace: ${{ inputs.workspace }}
          export-method: ${{ inputs.export-method }}
          options: |
            PROVISIONING_PROFILE_SPECIFIER=${{ env.PROFILE_NAME }}
            CODE_SIGN_STYLE=Manual
            OTHER_CODE_SIGN_FLAGS=--keychain=$HOME/Library/Keychains/login.keychain

      - name: Actualizar versión
        uses: cvch29/platform-actions/.github/actions/domains-v2/mobile/ios/build@main
        with:
          scheme: ${{ inputs.scheme }}
          workspace: ${{ inputs.workspace }}
          export-method: ${{ inputs.export-method }}
          options: |
            MARKETING_VERSION=${{ inputs.app-version }}
            CURRENT_PROJECT_VERSION=${{ inputs.app-version }}


      - name: Configurar Proyecto para IxGuard
        if: ${{ env.IXGUARD_ENABLED == 'true' }}
        uses: cvch29/platform-actions/.github/actions/domains-v2/mobile/ios/build@main
        with:
          scheme: ${{ inputs.scheme }}
          workspace: ${{ inputs.workspace }}
          export-method: ${{ inputs.export-method }}
          options: |
            ENABLE_BITCODE=YES
            ENABLE_TESTABILITY=NO
            ENABLE_TESTING_SEARCH_PATHS=NO

      - name: Configurar IxGuard Toolchain
        if: ${{ env.IXGUARD_ENABLED == 'true' }}
        uses: cvch29/platform-actions/.github/actions/domains-v2/mobile/ios/build@main
        with:
          scheme: ${{ inputs.scheme }}
          workspace: ${{ inputs.workspace }}
          export-method: ${{ inputs.export-method }}
          configure-ixguard-toolchain: true




      - name: Build iOS
        id: build
        uses: cvch29/platform-actions/.github/actions/domains-v2/mobile/ios/build@main
        with:
          scheme: ${{ inputs.scheme }}
          workspace: ${{ inputs.workspace }}
          export-method: ${{ inputs.export-method }}

      - name: Ofuscar .archive con IxGuard
        if: ${{ env.IXGUARD_ENABLED == 'true' }}
        uses: cvch29/platform-actions/.github/actions/domains-v2/mobile/ios/build@main
        with:
          scheme: ${{ inputs.scheme }}
          workspace: ${{ inputs.workspace }}
          export-method: ${{ inputs.export-method }}
          ixguard-obfuscate: true
          ixguard-license: ${{ secrets.IXGUARD_LICENSE }}
          ixguard-configuration: release

      - name: Artifact Management
        uses: cvch29/platform-actions/.github/actions/shared/artifact-manage@main
        with:
          app_name: ${{ inputs.app-name }}
          app_version: ${{ inputs.app-version }}
          path: app
          pattern: |
            build/outputs/apk/release/*.apk
            build/outputs/bundle/release/*.aab
            build/outputs/remote-config/config.json
            build/reports/profile/*.html
          name: android-release-files
          retention-days: 1
          if-no-files-found: warn
          compression-level: 6
          upload_path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
            app/remote-config/*.json
            app/build/reports/profile/*.html
            app/gradle.lockfile

      # - name: Upload Artifact
      #   uses: cvch29/platform-actions/.github/actions/shared-v2/artifact-upload@main
      #   with:
      #     name: ios-ipa-${{ inputs.app-name }}
      #     path: ${{ steps.build.outputs.ipa-path }}
      #     retention-days: 30
