name: 'Frontend React — Build'

on:
  workflow_call:
    inputs:
      app-name:
        type: string
        required: true
      environment:
        type: string
        required: false
        default: 'dev'
      node-version:
        type: string
        required: false
        default: '20'
      package-manager:
        type: string
        required: false
        default: 'npm'
    outputs:
      build-path:
        value: ${{ jobs.build.outputs.build-path }}
      version:
        value: ${{ jobs.build.outputs.version }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      build-path: ${{ steps.build.outputs.build-path }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: cvch29/platform-actions/.github/actions/shared/checkout@v1
        with:
          fetch-depth: 0
      - uses: cvch29/platform-actions/.github/actions/tooling/node/install@v1
        with:
          node-version: ${{ inputs.node-version }}
          package-manager: ${{ inputs.package-manager }}
      - id: version
        uses: cvch29/platform-actions/.github/actions/intelligence/versioning@v1
      - id: build
        uses: cvch29/platform-actions/.github/actions/tooling/node/build@v1
        with:
          package-manager: ${{ inputs.package-manager }}
          environment: ${{ inputs.environment }}
      - uses: cvch29/platform-actions/.github/actions/governance/sbom@v1
        with:
          artifact-path: .
          upload-artifact: true
      - uses: cvch29/platform-actions/.github/actions/shared/artifact-upload@v1
        with:
          name: frontend-build-${{ inputs.app-name }}
          path: ${{ steps.build.outputs.build-path }}
          retention-days: 7
