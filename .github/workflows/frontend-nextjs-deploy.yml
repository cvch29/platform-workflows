name: 'Frontend Next.js — Deploy'

on:
  workflow_call:
    inputs:
      app-name:
        type: string
        required: true
      environment:
        type: string
        required: true
      deployment-target:
        description: 'static-web-apps | aks | container-apps'
        type: string
        required: false
        default: 'static-web-apps'
      image-tag:
        type: string
        required: false
        default: ''
      acr-registry:
        type: string
        required: false
        default: ''
      aks-cluster-name:
        type: string
        required: false
        default: ''
      aks-resource-group:
        type: string
        required: false
        default: ''
    secrets:
      azure-static-web-apps-token:
        required: false
      azure-client-id:
        required: false
      azure-tenant-id:
        required: false
      azure-subscription-id:
        required: false

jobs:
  policy-check:
    runs-on: ubuntu-latest
    outputs:
      audit-token: ${{ steps.policy.outputs.audit-token }}
    steps:
      - uses: cvch29/platform-actions/.github/actions/intelligence/policy-engine@main
        id: policy
        with:
          environment: ${{ inputs.environment }}
          event-type: ${{ github.event_name }}
          actor: ${{ github.actor }}
          ref: ${{ github.ref }}

  deploy:
    name: Deploy → ${{ inputs.environment }}
    needs: policy-check
    runs-on: ${{ (inputs.environment == 'prod' || inputs.environment == 'staging') && 'self-hosted' || 'ubuntu-latest' }}
    environment:
      name: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: cvch29/platform-actions/.github/actions/shared/checkout@main
      - name: Deploy to Azure SWA
        if: inputs.deployment-target == 'static-web-apps'
        uses: Azure/static-web-apps-deploy@main
        with:
          azure_static_web_apps_api_token: ${{ secrets.azure-static-web-apps-token }}
          repo_token: ${{ github.token }}
          action: upload
          app_location: '/'
          output_location: '.next'
          app_build_command: 'npm run build'
      - name: Deploy to AKS
        if: inputs.deployment-target == 'aks'
        uses: cvch29/platform-actions/.github/actions/backend/node/deploy@main
        with:
          app-name: ${{ inputs.app-name }}
          environment: ${{ inputs.environment }}
          image-tag: ${{ inputs.image-tag }}
          acr-registry: ${{ inputs.acr-registry }}
          aks-cluster-name: ${{ inputs.aks-cluster-name }}
          aks-resource-group: ${{ inputs.aks-resource-group }}
      - if: always()
        uses: cvch29/platform-actions/.github/actions/governance/audit-log@main
        with:
          event-type: deploy
          environment: ${{ inputs.environment }}
          outcome: ${{ job.status }}
          app-name: ${{ inputs.app-name }}
          audit-token: ${{ needs.policy-check.outputs.audit-token }}
