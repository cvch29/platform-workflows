name: Mobile Android React Native PR

on:
  workflow_call:

permissions:
  id-token: write
  contents: write
  security-events: write
  pull-requests: write
  actions: write
  checks: write

jobs:
  unit_test:
    name: Unit Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Android Unit Test
        uses: cvch29/platform-actions/actions/domains/mobile/android-native/unit-test@main

  security:
    name: Security Analysis
    runs-on: ubuntu-latest

    strategy:
      matrix:
        analysis: [sast, sca]
      fail-fast: false

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run SAST Analysis
        if: matrix.analysis == 'sast'
        uses: cvch29/platform-actions/actions/security-quality/sast/codeql@main
        with:
          language: java, kotlin
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run SCA Analysis
        if: matrix.analysis == 'sca'
        uses: cvch29/platform-actions/actions/security-quality/sca/dependency-review@main

  quality:
    name: Quality Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Quality Analysis
        uses: cvch29/platform-actions/actions/security-quality/sast/sonar@main