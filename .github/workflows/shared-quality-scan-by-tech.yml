name: 'Shared — Quality Scan'

on:
  workflow_call:
    inputs:
      app-name:
        type: string
        required: true
      app-version:
        type: string
        required: true
      language:
        description: 'javascript | java | kotlin | android | python | swift'
        type: string
        required: true
      environment:
        type: string
        required: false
        default: 'dev'
      # ── Tool toggles ────────────────────────────────────────────────────────
      run-sonar:
        type: boolean
        required: false
        default: true
      run-secrets:
        type: boolean
        required: false
        default: true
      severity-threshold:
        description: 'low | moderate | high | critical'
        type: string
        required: false
        default: 'high'
      # ── Sonar inputs ────────────────────────────────────────────────────────
      sonar-host-url:
        description: 'SonarQube server URL (e.g. https://sonar.mybank.com)'
        type: string
        required: false
        default: 'http://192.168.1.199:9000'
      sonar-token:
        description: 'SonarQube token (e.g. squ_1234567890abcdef)'
        type: string
        required: false
        default: 'squ_a99d67d5e6cd375765943b0e2504533494c9ab8f'
      sonar-project-key:
        description: 'SonarQube project key. Default: repo slug.'
        type: string
        required: false
        default: ''
      sonar-quality-gate-wait:
        description: 'Break the build if Quality Gate fails. Bank policy: true.'
        type: boolean
        required: false
        default: true
      sonar-coverage-report:
        description: 'Path to coverage report for Sonar (lcov.info / jacoco XML / coverage.xml)'
        type: string
        required: false
        default: ''
      sonar-android-flavor:
        description: 'Android flavor for Sonar report paths'
        type: string
        required: false
        default: ''
      properties:
        description: 'Additional properties to pass to SonarQube (e.g. -Dsonar.exclusions=**/*.test.js)'
        type: string
        required: false
        default: ''
      repository-name:
        description: 'Repository name (e.g. cvch29/java-sample-app)'
        type: string
        required: false
        default: ${{ github.event.repository.name }}
    secrets:
      sonar-token:
        required: false
    # outputs:
    #   sonar-quality-gate:
    #     value: ${{ jobs.sonar.outputs.quality-gate-status }}
jobs:
  sonar:
    name: SonarQube Analysis
    runs-on: arc-general
    # container:
    #   image: ${{ inputs.container-image-name-runner }}
    #   options: ${{ inputs.container-image-resource-runner }}
    permissions:
      contents: read
    # outputs:
    #   quality-gate-status: ${{ steps.sonar.outputs.quality-gate-status }}
    #   dashboard-url: ${{ steps.sonar.outputs.dashboard-url }}

    steps:
      - uses: cvch29/platform-actions/actions/shared/checkout@main
        with:
          fetch-depth: 0   # Sonar needs full history for blame/new code detection

      - name: Git Differences
        run: |
          git merge-base origin/main HEAD
          git diff --name-only origin/main...HEAD | wc -l

      - name: Sonar Setup
        uses: cvch29/platform-actions/actions/security/sonar-setup@main
        with:
          sonar-host-url: ${{ inputs.sonar-host-url }}
          sonar-token: ${{ secrets.sonar-token }}
          project-key: ${{ inputs.sonar-project-key }}

      # - name: Coverage
      #   id: coverage
      #   uses: cvch29/platform-actions/actions/security/coverage-sonar@main
      #   with:
      #     language: ${{ inputs.language }}
      #     java-version: ${{ inputs.java-version }}
      #     node-version: ${{ inputs.node-version }}
      #     python-version: ${{ inputs.python-version }}

      - name: Clean Sonar Properties
        run: find . -type f -name sonar-project.properties -delete

      - name: Sonar Analysis
        uses: cvch29/platform-actions/actions/security/sonar@main
        with:
          language: ${{ inputs.language }}
          sonar-host-url: ${{ inputs.sonar-host-url }}
          sonar-token: ${{ inputs.sonar-token }}
          project-key: ${{ inputs.repository-name }}
          app-version: ${{ inputs.app-version }}
          properties: ${{ inputs.properties }}

      # - name: Setup SonarQube Analysis
      #   uses: cvch29/platform-actions/actions/security/sonar-wontfix@main
      # - name: Wait for CE processing
      #   run: sleep 10

      - name: Quality Gate
        uses: cvch29/platform-actions/actions/security/sonar-break-build@main
        env:
          QUALITY_GATE_ENABLED: 'true'          # ← activa el bloqueo
          QUALITY_GATE_VALIDATE_EXCLUDE: 'false' # ← no excluir la validación
        with:
          sonar-host-url: ${{ inputs.sonar-host-url }}
          sonar-token: ${{ inputs.sonar-token }}
          project: ${{ inputs.repository-name }}
          branch: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref_name }}
          quality-gate-name: "DevOps-Sonar26"
