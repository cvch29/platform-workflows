name: 'Shared — Quality Scan'

on:
  workflow_call:
    inputs:
      app-name:
        type: string
        required: true
      app-version:
        type: string
        required: true
      language:
        description: 'javascript | java | kotlin | android | python | swift'
        type: string
        required: true
      environment:
        type: string
        required: false
        default: 'dev'
      # ── Tool toggles ────────────────────────────────────────────────────────
      run-sonar:
        type: boolean
        required: false
        default: true
      run-secrets:
        type: boolean
        required: false
        default: true
      severity-threshold:
        description: 'low | moderate | high | critical'
        type: string
        required: false
        default: 'high'
      # ── Sonar inputs ────────────────────────────────────────────────────────
      sonar-host-url:
        description: 'SonarQube server URL (e.g. https://sonar.mybank.com)'
        type: string
        required: false
        default: 'http://192.168.1.199:9000'
      sonar-token:
        description: 'SonarQube token (e.g. squ_1234567890abcdef)'
        type: string
        required: false
        default: 'squ_a99d67d5e6cd375765943b0e2504533494c9ab8f'
      sonar-project-key:
        description: 'SonarQube project key. Default: repo slug.'
        type: string
        required: false
        default: ''
      sonar-quality-gate-wait:
        description: 'Break the build if Quality Gate fails. Bank policy: true.'
        type: boolean
        required: false
        default: true
      sonar-coverage-report:
        description: 'Path to coverage report for Sonar (lcov.info / jacoco XML / coverage.xml)'
        type: string
        required: false
        default: ''
      sonar-android-flavor:
        description: 'Android flavor for Sonar report paths'
        type: string
        required: false
        default: ''
      properties:
        description: 'Additional properties to pass to SonarQube (e.g. -Dsonar.exclusions=**/*.test.js)'
        type: string
        required: false
        default: ''
      gitflow:
        description: 'true para activar modo GitFlow'
        type: boolean
        required: false
        default: true
      repository-name:
        description: 'Repository name (e.g. cvch29/java-sample-app)'
        type: string
        required: false
        default: ${{ github.event.repository.name }}
      analysis-mode:
        description: 'pr → new code only | branch → full branch bajo rama destino'
        type: string
        required: false
        default: 'pr'
    secrets:
      sonar-token:
        required: false
    # outputs:
    #   sonar-quality-gate:
    #     value: ${{ jobs.sonar.outputs.quality-gate-status }}
jobs:
  sonar:
    name: SonarQube Analysis
    runs-on: arc-general
    # container:
    #   image: ${{ inputs.container-image-name-runner }}
    #   options: ${{ inputs.container-image-resource-runner }}
    permissions:
      contents: read
    # outputs:
    #   quality-gate-status: ${{ steps.sonar.outputs.quality-gate-status }}
    #   dashboard-url: ${{ steps.sonar.outputs.dashboard-url }}

    steps:
      - uses: cvch29/platform-actions/actions/shared/checkout@main
        with:
          fetch-depth: 0   # Sonar needs full history for blame/new code detection

      # - name: Git Differences
      #   run: |
      #     git merge-base origin/main HEAD
      #     git diff --name-only origin/main...HEAD | wc -l

      - name: Determinar analysis-mode
        id: mode
        shell: bash
        run: |
          if [ "${{ github.base_ref }}" = "develop" ]; then
            echo "value=pr" >> $GITHUB_OUTPUT
          else
            echo "value=branch" >> $GITHUB_OUTPUT
          fi

      - name: Actualizar rama con target
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "github-actions"
          git fetch origin ${{ github.base_ref }}
          git merge origin/${{ github.base_ref }} --no-edit --no-ff

      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.sonar/cache
          key: sonar-maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            sonar-maven-${{ runner.os }}-

      - name: Sonar Setup
        id: sonar-setup
        uses: cvch29/platform-actions/actions/security/sonar-setup@main
        with:
          sonar-host-url: ${{ inputs.sonar-host-url }}
          sonar-token: ${{ inputs.sonar-token }}
          project-key: ${{ inputs.repository-name }}
          project-name: ${{ inputs.app-name }}
          quality-gate-name: "DevOps-Sonar26"
          current-branch: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          reference-branch: main
          gitflow: ${{ inputs.gitflow }}

      # - name: Coverage
      #   id: coverage
      #   uses: cvch29/platform-actions/actions/security/coverage-sonar@main
      #   with:
      #     language: ${{ inputs.language }}

      - name: Clean Sonar Properties
        run: find . -type f -name sonar-project.properties -delete

      - name: Sonar Analysis
        uses: cvch29/platform-actions/actions/security/sonar@main
        with:
          language: ${{ inputs.language }}
          sonar-host-url: ${{ inputs.sonar-host-url }}
          sonar-token: ${{ inputs.sonar-token }}
          project-key: ${{ inputs.repository-name }}
          app-version: "1.2.0-${{ github.run_number }}"
          quality-gate-timeout: "300"
          analysis-mode: "branch"
          properties: ${{ inputs.properties }}
          # coverage-report-path: ${{ steps.coverage.outputs.report-path }}

      # - name: Setup SonarQube Analysis
      #   uses: cvch29/platform-actions/actions/security/sonar-wontfix@main
      - name: Wait for CE processing
        run: sleep 10

      - name: Quality Gate
        uses: cvch29/platform-actions/actions/security/sonar-break-build@main
        env:
          QUALITY_GATE_ENABLED: 'true'          # ← activa el bloqueo
          QUALITY_GATE_VALIDATE_EXCLUDE: 'false' # ← no excluir la validación
        with:
          sonar-host-url: ${{ inputs.sonar-host-url }}
          sonar-token: ${{ inputs.sonar-token }}
          project: ${{ inputs.repository-name }}
          branch: ${{ github.ref_name }}
          quality-gate-name: "DevOps-Sonar26"
